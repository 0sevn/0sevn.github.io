<!DOCTYPE html>

<meta charset="UTF-8">
<title>Spiral Poplog</title>
<link rel="stylesheet" href="style.css">
<style>
  body {
    margin: 0;
    background: #000;
    overflow-x: hidden;
    font-family: system-ui, sans-serif;
    color: white;
  }

  /* Fixed background scene for Spiral Mode */
  .scene {
    position: fixed;
    inset: 0;
    perspective: 1200px;
    overflow: hidden;
    pointer-events: none; /* Allows scrolling through the scene */
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .spiral {
    position: relative;
    transform-style: preserve-3d;
    pointer-events: auto; /* Re-enable clicks for items */
  }

  .item {
    all: unset;
    position: absolute;
    width: 400px; /* Slightly smaller for better spiral density */
    height: 180px;
    padding: 5px;
    margin: 20px; /* Center alignment */
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(5px);
    /* border: 1px solid rgba(255, 255, 255, 0.1); */
    border-radius: 12px;
    color: white;
    transition: background 0.3s, border 0.3s, transform 0.1s;
    cursor: pointer;
    will-change: transform, opacity;
  }

  .item:hover {
    background: rgba(255, 255, 255, 0.15);
    border: 1px solid rgba(255, 255, 255, 0.4);
  }

  .item img {
    width: 100%;
    height: 140px;
    object-fit: cover;
    border-radius: 6px;
    margin-bottom: 8px;
  }

  .title { font-size: 16px; font-weight: bold; }

  /* List Mode Styles */
  .list-mode-container {
    display: none;
    flex-direction: column;
    align-items: center;
    padding: 100px 20px;
  }

  .list-mode .list-mode-container { display: flex; }
  .list-mode .scene { display: none; }

  .list-item {
    width: 100%;
    max-width: 600px;
    background: #111;
    margin-bottom: 20px;
    padding: 15px;
    border-radius: 12px;
    border: 1px solid #333;
  }

  /* UI Elements */
  .menu {
    position: fixed;
    top: 0; width: 100%;
    background: rgba(0, 0, 0, 0.8);
    backdrop-filter: blur(10px);
    padding: 15px;
    z-index: 2000;
    text-align: center;
    border-bottom: 1px solid #333;
  }

  button {
    background: #222;
    color: white;
    border: 1px solid #444;
    padding: 8px 16px;
    margin: 0 5px;
    border-radius: 4px;
    cursor: pointer;
  }

  button:hover { background: #444; }

  .popover {
    width: 420px;
    max-width: 90%;
    padding: 30px;
    border-radius: 12px;
    background: #111;
    color: white;
    border: 1px solid #333;
  }

  .popover::backdrop {
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(8px);
  }

  #scrollTopBtn {
    position: fixed;
    bottom: 20px; right: 20px;
    display: none;
    z-index: 1000;
  }

  body {
    /* background-color: var(--bg-color);
    font-family: var(--font-main);
    color: var(--text-primary); */
    overflow-x: hidden; /* Prevent body scroll, handle in container */
}

/* --- Timeline Container (Desktop Horizontal) --- */
.timeline-container {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    overflow-x: auto; /* Horizontal Scroll */
    overflow-y: hidden;
    padding: 0 10vw; /* Spacing on sides */
    gap: 80px;
    scroll-behavior: auto;
    /* Custom Scrollbar Styling */
    scrollbar-width: thin;
    scrollbar-color: var(--accent-glow) var(--bg-color);
}

/* Hide scrollbar for cleaner look (optional) */
.timeline-container::-webkit-scrollbar {
    height: 8px;
}
.timeline-container::-webkit-scrollbar-track {
    background: var(--bg-color);
}
.timeline-container::-webkit-scrollbar-thumb {
    background-color: var(--accent-glow);
    border-radius: 10px;
}

/* --- The Central Line --- */
.timeline-line {
    position: absolute;
    top: 50%;
    left: 0;
    width: 2500px; /* Long enough to cover all items */
    height: 2px;
    background: linear-gradient(90deg, 
        transparent 0%, 
        var(--accent-glow) 20%, 
        var(--accent-secondary) 80%, 
        transparent 100%);
    z-index: 0;
    transform: translateY(-50%);
}
</style>
</head>
<body class="list-mode">

<header class="menu">
    <button onclick="switchList('movies')">Movies</button>
    <button onclick="switchList('books')">Books</button>
    <button onclick="switchList('misc')">Misc</button>
    <button id="toggleBtn" onclick="toggleLayout()">Switch to Spiral View</button>
</header>
<script>
    const container = document.querySelector('.timeline-container');

    container.addEventListener('wheel', (evt) => {
        // Check if we are in desktop view (horizontal mode)
        // The breakpoint 900px matches your CSS media query
        if (window.innerWidth > 900) {
            // Prevent the default vertical scroll
            evt.preventDefault();
            
            // Scroll horizontally by the amount the user scrolled vertically
            // 'evt.deltaY' is the vertical scroll amount
            container.scrollLeft += evt.deltaY;
        }
    });
  </script>
<div class="scene">
    <div class="spiral" id="spiral"></div>
</div>

</div>

let currentLayout = 'list';
let currentData = 'movies';
let targetScroll = 0;
let currentScroll = 0;
let itemElements = [];

function render() {
    const spiral = document.getElementById("spiral");
    const listContainer = document.getElementById("listContainer");
    
    spiral.innerHTML = '';
    listContainer.innerHTML = '';
    itemElements = [];

    const items = dataSets[currentData];
    
    // Adjust scroll height
    const spacing = 500;
    document.body.style.height = (items.length * spacing + window.innerHeight) + "px";

    items.forEach((post, i) => {
        // Create Spiral Element

        const el = document.createElement("button");
        el.className = "item";
        el.setAttribute("popovertarget", "postPopover");
        el.innerHTML = `
            <img src="${currentData}/${post.title}.jpg" onerror="this.src=''"/>
            <div class="title">${post.title}</div>
        `;
        el.onclick = () => showDetails(post);
        spiral.appendChild(el);
        itemElements.push(el);

        // Create List Element
        const listEl = document.createElement("div");
        listEl.className = "list-item";
        listEl.innerHTML = `<h3>${post.title}</h3><p>${post.description}</p><small>${post.date}</small>`;
        listContainer.appendChild(listEl);
    });
}

function showDetails(post) {
    const content = document.getElementById("popoverContent");
    content.innerHTML = `
        <h2>${post.title}</h2>
        <p>${post.description}</p>
        <div style="opacity:0.5; margin-top:20px;">
            ${post.category} <br> ${post.date}
        </div>
    `;
}

function update() {
    if (currentLayout === 'spiral') {
        currentScroll += (targetScroll - currentScroll) * 0.08;
        const spacing = 600;

        itemElements.forEach((item, i) => {
            let t = (i * spacing) - currentScroll;
            const angle = t * 0.004; 
            const radius = 250;
            
            const x = Math.cos(angle) * radius;
            const y = Math.sin(angle) * radius;
            const z = t; 

            // --- Focus Logic ---
            const focusStart = -730;
            const focusEnd = -150;
            const transitionMargin = 200; // Smooth fade-in/out distance

            // Calculate how "focused" the item is (1 = center of focus area, 0 = far away)
            // This creates a plateau of visibility between -700 and -100
            let focusFactor = 0;
            if (z >= focusStart && z <= focusEnd) {
                focusFactor = 1;
            } else if (z < focusStart) {
                focusFactor = Math.max(0, 1 - (focusStart - z) / transitionMargin);
            } else {
                focusFactor = Math.max(0.3, 1 - (z - focusEnd) / transitionMargin);
            }

            // Apply logic to styles
            const scale = 1 / (1 + Math.max(0, z * 0.0015));
            const blur = (1 - focusFactor) * 10; // Max blur of 10px when out of focus
            const opacity = focusFactor;         // 0 when out of focus, 1 when in focus

            item.style.transform = `translate3d(${x}px, ${y}px, ${-z}px) scale(${scale})`;
            item.style.filter = `blur(${blur}px)`;
            item.style.opacity = opacity;
            item.style.zIndex = Math.round(10000 - z);
            
            // Matches your existing logic
            item.style.pointerEvents = (z < focusStart || z > focusEnd) ? 'none' : 'auto';
        });
    }
    requestAnimationFrame(update);
}

function toggleLayout() {
    currentLayout = currentLayout === 'list' ? 'spiral' : 'list';
    document.body.className = currentLayout + '-mode';
    document.getElementById('toggleBtn').innerText = currentLayout === 'spiral' ? 'Switch to List View' : 'Switch to Spiral View';
    if(currentLayout === 'list') document.body.style.height = 'auto';
    else render();
}

function switchList(key) {
    currentData = key;
    render();
    window.scrollTo(0, 0);
}

window.addEventListener("scroll", () => {
    targetScroll = window.scrollY;
    const btn = document.getElementById("scrollTopBtn");
    btn.style.display = window.scrollY > 300 ? "block" : "none";
});

function scrollToTop() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Start
render();
update();
</script>
