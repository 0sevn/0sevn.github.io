<style>
  body {
    margin: 0;
    height: 600vh;
    background: #000;
    overflow-x: hidden;
    font-family: system-ui, sans-serif;
  }

  .scene {
    position: fixed;
    inset: 0;
    perspective: 1200px;
    overflow: hidden;
  }

  .spiral {
    position: absolute;
    top: 50%;
    left: 35%;
    transform-style: preserve-3d;
  }

.item {
  all: unset;
  position: absolute;
  width: 400px; /* Slightly smaller for better spiral density */
  height: 220px;
  padding: 5px;
  margin: 20px; /* Center alignment */
  background: rgba(255, 255, 255, 0.03);
  backdrop-filter: blur(5px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 12px;
  color: white;
  transition: background 0.3s, border 0.3s, transform 0.1s;
  cursor: pointer;
  will-change: transform, opacity;
}

.item:hover {
  background: rgba(255, 255, 255, 0.15);
  border: 1px solid rgba(255, 255, 255, 0.4);
  z-index: 1000; /* Bring hovered item to front */
}

.item img {
  width: 100%;
  height: 170px;
  object-fit: cover;
  border-radius: 6px;
  margin-bottom: 8px;
  pointer-events: none; /* Let clicks pass to the button */
}
.item:focus {
  outline: none;
}

  .title {
    font-size: 16px;
    margin-bottom: 8px;
  }

  .description {
    font-size: 13px;
    opacity: 0.7;
    margin-bottom: 12px;
  }

  .meta {
    font-size: 12px;
    opacity: 0.5;
    display: flex;
    justify-content: space-between;
  }
  img {
  width: 100%;
  height:180px;
  /* height: 140px; */
  object-fit: cover;
  margin-bottom: 10px;
  border-radius: 4px;
}
.popover {
  width: 420px;
  max-width: 90%;
  padding: 30px;
  border-radius: 12px;
  border: none;
  background: #111;
  color: white;
}

.popover::backdrop {
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
}

.close {
  position: absolute;
  top: 15px;
  right: 20px;
  background: none;
  border: none;
  color: white;
  font-size: 22px;
  cursor: pointer;
}

</style>

const spiral = document.getElementById("spiral");
const popoverContent = document.getElementById("popoverContent");

const total = posts.length;
const spacing = 500;      // Distance between items in Z-space
const radius = 600;       // How wide the spiral is
const angleStep = 0.6;    // Tightness of the spiral
const totalDepth = total * spacing;

// Set page height based on content
// document.body.style.height = (total * 500) + "px"; 
// total * spacing + window height (so the last item can pass through the center)
document.body.style.height = (total * spacing + window.innerHeight) + "px";


let items = [];
let targetScroll = 0;
let currentScroll = 0;

// Initialize Items
posts.forEach((post, i) => {
  const el = document.createElement("button");
  el.className = "item";
  el.popoverTargetElement = document.getElementById("postPopover");
  
  el.innerHTML = `
    <img src="movies/${post.title}.jpg" onerror="this.src='https://via.placeholder.com/300x180?text=No+Image'"/>
    <div class="title"><strong>${post.title}</strong></div>
  `;

  el.addEventListener("click", () => {
    popoverContent.innerHTML = `
      <h2 style="margin-top:0">${post.title}</h2>
      <img src="movies/${post.title}.jpg" style="width:100%; border-radius:8px;" onerror="this.src='https://via.placeholder.com/600x400?text=No+Image'"/>
      <p style="line-height:1.6; font-size:1.1rem;">${post.description}</p>
      <hr style="border:0; border-top:1px solid #333; margin:20px 0;">
      <div style="opacity:0.6;">
        ${post.category} <br> 
        ${post.date}
      </div>
    `;
  });

  spiral.appendChild(el);
  items.push(el);
});

function update() {
  // A. Calculate Position Based on Absolute Scroll
  // Smoothing the scroll input
  currentScroll += (targetScroll - currentScroll) * 0.07;

  items.forEach((item, i) => {
    // Determine 't' (normalized progress along the trajectory)
    // We use the index to offset items, but currentScroll moves the entire set
    let t = (i * spacing) - currentScroll;

    // B. Map t to Coordinates (The Spiral Trajectory)
    // Instead of using 'i' for the angle, we use 't' so the spiral is fixed in space
    const angle = t * 0.004; // Adjust multiplier for spiral tightness
    const radius = 200;      // Constant radius
    
    const x = Math.cos(angle) * radius;
    const y = Math.sin(angle) * radius;
    const z = t;             // Depth is mapped directly to our progress value

    // C. Lock Properties to the Coordinate
    // We calculate scale and effects based on 'z' (the current position)
    // This ensures Property Persistence: if an item is at z=500, it always has scale X.
    
    const depthFactor = 0.2;
    const blurFactor = 0.5;

    // Standard perspective scale: 1 / (1 + depth)
    // We use Math.max to prevent division by zero or negative scaling
    const scale = 1 / (1 + Math.max(0, z * depthFactor));
    const blur = Math.max(0, z * blurFactor);
    
    // Calculate opacity based on distance from a "focus point" (e.g., z = 0)
    const opacity = Math.max(0, 1 - Math.abs(z) / 1000);

    // Apply transformations
    item.style.transform = `translate3d(${x}px, ${y}px, ${-z}px) scale(${scale})`;
    item.style.filter = `blur(${blur}px)`;
    item.style.opacity = opacity;
    item.style.zIndex = Math.round(10000 - z); // Ensure correct stacking
  });

  requestAnimationFrame(update);
}

window.addEventListener("scroll", () => {
  targetScroll = window.scrollY;
});

update();
