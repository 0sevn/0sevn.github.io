<style>
  body {
    margin: 0;
    background: #2e2e2e;
    overflow-x: hidden;
    font-family: system-ui, sans-serif;
    color: white;
  }

  /* Fixed background scene for Spiral Mode */
  .scene {
    position: fixed;
    inset: 0;
    perspective: 1200px;
    overflow: hidden;
    pointer-events: none; /* Allows scrolling through the scene */
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .spiral {
    position: relative;
    transform-style: preserve-3d;
    pointer-events: auto; /* Re-enable clicks for items */
    /* top: 50%; cool effect tunnel*/
    /* left: 50%; */
  }

  .item {
    all: unset;
    position: absolute;
    width: 400px; /* Slightly smaller for better spiral density */
    height: 180px;
    padding: 5px;
    margin: 20px; /* Center alignment */
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(5px);
    /* border: 1px solid rgba(255, 255, 255, 0.1); */
    border-radius: 12px;
    color: white;
    transition: background 0.3s, border 0.3s, transform 0.1s;
    cursor: pointer;
    will-change: transform, opacity;
  }

  .item:hover {
    background: rgba(255, 255, 255, 0.15);
    border: 1px solid rgba(255, 255, 255, 0.4);
  }

  .item img {
    width: 100%;
    height: 140px;
    object-fit: cover;
    border-radius: 6px;
    margin-bottom: 8px;
  }

  .title { font-size: 16px; font-weight: bold; }

  /* List Mode Styles */
  .list-mode-container {
    display: none;
    flex-direction: column;
    align-items: center;
    padding: 100px 20px;
  }

  .list-mode .list-mode-container { display: flex; }
  .list-mode .scene { display: none; }

  .list-item {
    width: 100%;
    max-width: 600px;
    background: #111;
    margin-bottom: 20px;
    padding: 15px;
    border-radius: 12px;
    border: 1px solid #333;
  }
    .list-item2 {
    width: 100%;
    font-size: 18px;
    max-width: 800px;
    background: #111;
    margin-bottom: 20px;
    padding: 15px;
    border-radius: 12px;
    border: 1px solid #333;
  }

  /* UI Elements */
  .menu {
    position: fixed;
    top: 0; width: 100%;
    background: rgba(0, 0, 0, 0.8);
    backdrop-filter: blur(10px);
    padding: 15px;
    z-index: 2000;
    text-align: center;
    border-bottom: 1px solid #333;
  }

  button {
    background: #222;
    color: white;
    border: 1px solid #444;
    padding: 8px 16px;
    margin: 0 5px;
    border-radius: 4px;
    cursor: pointer;
  }

  button:hover { background: #444; }

  .popover {
    width: 420px;
    max-width: 90%;
    padding: 30px;
    border-radius: 12px;
    background: #111;
    color: white;
    border: 1px solid #333;
  }

  .popover::backdrop {
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(8px);
  }

  #scrollTopBtn {
    position: fixed;
    bottom: 20px; right: 20px;
    display: none;
    z-index: 1000;
  }



</style>
</head>

<header class="menu">

let currentLayout = 'list';
let currentData = 'movies';
let targetScroll = 0;
let currentScroll = 0;
let itemElements = [];
let isLoopRunning = false; // Prevents the infinite update loop when not in spiral mode


function render() {
    const spiral = document.getElementById("spiral");
    const listContainer = document.getElementById("listContainer");
    
    spiral.innerHTML = '';
    listContainer.innerHTML = '';
    itemElements = [];

    const items = dataSets[currentData];
    
    // Adjust scroll height dynamically based on layout
    if (currentLayout === 'spiral') {
        const spacing = 500;
        document.body.style.height = (items.length * spacing + window.innerHeight) + "px";
    
        // Generate placeholder/wrapper elements for the spiral to manage calculations efficiently
        // We only fill/render the visible 5-10 items during the update() loop.
       items.forEach((post, i) => {
        // Create Spiral Element

        const el = document.createElement("button");
        el.className = "item";
        el.setAttribute("popovertarget", "postPopover");
        el.innerHTML = `
            <img src="${currentData}/${post.title}.jpg" onerror="this.src='https://via.placeholder.com/400x140?text=${encodeURIComponent(post.title)}'"/>
            <div class="title">${post.title}</div>
        `;
        el.onclick = () => showDetails(post);
        el.style.display = 'none'; // Hidden by default until in viewport range
        spiral.appendChild(el);
        itemElements.push({ element: el, data: post });

        // Create List Element
        const listEl = document.createElement("div");
        listEl.className = "list-item";
        listEl.innerHTML = `<h3>${post.title}</h3><p>${post.description}</p><small>${post.date}</small>`;
        listContainer.appendChild(listEl);
    });
    // Fire up the animation loop only when entering spiral mode
        if (!isLoopRunning) {
            isLoopRunning = true;
            requestAnimationFrame(update);
        }
      } else {
        // --- LIST MODE --- 
        // No spiral elements calculated or rendered. Standard efficient DOM printing.
        document.body.style.height = 'auto';
        isLoopRunning = false; // Halts the update() loop execution

        items.forEach((post) => {
            const listEl = document.createElement("div");
            listEl.className = "list-item2";
            listEl.innerHTML = `<h3>${post.title}</h3><br><p>${post.description}</p><small>${post.date}</small>`;
            listContainer.appendChild(listEl);
        });
    }

   
}

function showDetails(post) {
    const content = document.getElementById("popoverContent");
    content.innerHTML = `
        <h2>${post.title}</h2>
        <img src="${currentData}/${post.title}.jpg" style="width:100%; border-radius:8px;" onerror="this.src='https://via.placeholder.com/600x400?text=No+Image'"/>
        <p style="line-height:1.6; font-size:1.1rem;">${post.description}</p>
      <hr style="border:0; border-top:1px solid #333; margin:20px 0;">
      <div style="opacity:0.6;">
        Space: ${post.category} <br> 
        Logged: ${post.date}
      </div>
    `;
}

// let rafId = null;

function update() {
    // Hard exit condition: completely stops the RAF loop if layout is not spiral
    if (currentLayout !== 'spiral' || !isLoopRunning) {
        isLoopRunning = false;
        return; 
    }

        currentScroll += (targetScroll - currentScroll) * 0.08;
        const spacing = 600;

        // Determine target boundaries for rendering elements (roughly 5-10 items in focus range)
 // --- Focus Logic ---
            const focusStart = -730;
            const focusEnd = -150;
            const transitionMargin = 200; // Smooth fade-in/out distance

            // Anything outside this window gets dynamically unloaded from DOM/hidden
    const visibilityBufferStart = focusStart - transitionMargin-250;
    const visibilityBufferEnd = focusEnd + transitionMargin+2500;

        itemElements.forEach((itemObj, i) => {
          const { element, data } = itemObj;
          const t = (i * spacing) - currentScroll;

// Performance Check: Is the item within the 5-10 item viewable window?
        if (t >= visibilityBufferStart && t <= visibilityBufferEnd) {
            
            // Lazy load HTML content only when it becomes visible
            if (!element.innerHTML) {
                element.innerHTML = `
                    <img src="${currentData}/${data.title}.jpg" onerror="this.src='https://via.placeholder.com/400x140?text=${encodeURIComponent(data.title)}'"/>
                    <div class="title">${data.title}</div>
                `;
            }
            element.style.display = 'block';

            
            const angle = t * 0.004; 
            const radius = 250;
            
            const x = Math.cos(angle) * radius;
            const y = Math.sin(angle) * radius;
            const z = t; 

           
            // Calculate how "focused" the item is (1 = center of focus area, 0 = far away)
            // This creates a plateau of visibility between -700 and -100
            let focusFactor = 0;
            if (z >= focusStart && z <= focusEnd) {
                focusFactor = 1;
            } else if (z < focusStart) {
                focusFactor = Math.max(0, 1 - (focusStart - z) / transitionMargin);
            } else {
                focusFactor = Math.max(0.3, 1 - (z - focusEnd) / transitionMargin);
            }

            // Apply logic to styles
            const scale = 1 / (1 + Math.max(0, z * 0.0015));
            const blur = (1 - focusFactor) * 10; // Max blur of 10px when out of focus
            const opacity = focusFactor;         // 0 when out of focus, 1 when in focus

            element.style.transform = `translate3d(${x}px, ${y}px, ${-z}px) scale(${scale})`;
            element.style.filter = `blur(${blur}px)`;
            element.style.opacity = opacity;
            element.style.zIndex = Math.round(10000 - z);
            
            // Matches your existing logic
            element.style.pointerEvents = (z < focusStart || z > focusEnd) ? 'none' : 'auto';
          } else {
            // Out of viewport range -> Hide completely & free memory
            if (element.style.display !== 'none') {
                element.style.display = 'none';
                element.innerHTML = ''; // Clears the heavy images/DOM when not in view
            }
          }
        });
    requestAnimationFrame(update);
}

function toggleLayout() {
    currentLayout = currentLayout === 'list' ? 'spiral' : 'list';
    document.body.className = currentLayout + '-mode';
    document.getElementById('toggleBtn').innerText = currentLayout === 'spiral' ? 'Switch to List View' : 'Switch to Spiral View';
    
    // Clear out alternate view DOM immediately on layout change
    if (currentLayout === 'list') {
        document.getElementById("spiral").innerHTML = '';
        itemElements = [];
    }
    
    render();
}

function switchList(key) {
    currentData = key;
    render();
    window.scrollTo(0, 0);
}

window.addEventListener("scroll", () => {
    targetScroll = window.scrollY;
    const btn = document.getElementById("scrollTopBtn");
    btn.style.display = window.scrollY > 300 ? "block" : "none";
});

    window.scrollTo({ top: 0, behavior: 'smooth' });
}
